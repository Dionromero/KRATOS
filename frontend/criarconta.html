<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Projeto 5</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind-config.js"></script>  

</head>
<body class="bg-sky-gradient min-h-screen relative flex items-center justify-center">

  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0" aria-hidden="true">
    
    <img src="img/Nuvens2.svg" class="absolute left-1/2 -translate-x-1/2 top-[15%] w-[130%] h-auto animate-[pulse_4s_ease-in-out_infinite]" alt="">

    <img src="img/montanha.svg" class="absolute bottom-0 w-[200%] md:w-full max-w-none left-1/2 -translate-x-1/2 md:left-0 md:translate-x-0 h-auto translate-y-[15%] md:translate-y-[40%] object-cover" alt="">
    
  </div>

  <div class="relative z-10 w-full max-w-[600px] px-4 mx-auto mt-12 mb-10">
    <div class="bg-brand-cardBg rounded-[45px] px-6 md:px-12 pt-12 md:pt-16 pb-10 shadow-xl relative border-[3px] border-[#D6E2C6]/50">
      
      <div class="absolute -top-7 left-1/2 -translate-x-1/2 bg-brand-inputBg border-[2px] border-brand-btnBorder rounded-full px-6 md:px-10 py-2 shadow-md">
        <h1 class="text-xl md:text-3xl font-bold text-brand-textDark whitespace-nowrap">BEM-VINDO!</h1>
      </div>

      <h2 class="text-[26px] text-brand-textDark text-center mb-6">
        Realize o cadastro de <span class="font-bold">responsável!</span>
      </h2>

      <form id="registerForm" class="flex flex-col space-y-4">
        
        <div>
          <label for="nameInput" class="block text-brand-textDark font-medium mb-1 pl-3 text-lg">Preencha seus dados:</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-inputBorder group-focus-within:text-brand-btnBorder transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input 
              id="nameInput"
              type="text" 
              placeholder="Nome" 
              class="w-full bg-brand-inputBg border border-brand-inputBorder rounded-xl pl-12 pr-5 py-3 text-brand-textDark placeholder-brand-inputBorder/80 focus:outline-none focus:ring-2 focus:ring-brand-btnBorder shadow-inner text-lg transition-all duration-300"
              required
            />
          </div>
        </div>

        <div class="pt-1">
          <label for="emailInput" class="sr-only">E-mail</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-inputBorder group-focus-within:text-brand-btnBorder transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input 
              id="emailInput"
              type="email" 
              placeholder="E-mail" 
              class="w-full bg-brand-inputBg border border-brand-inputBorder rounded-xl pl-12 pr-5 py-3 text-brand-textDark placeholder-brand-inputBorder/80 focus:outline-none focus:ring-2 focus:ring-brand-btnBorder shadow-inner text-lg transition-all duration-300"
              required
            />
          </div>
        </div>

        <div class="pt-3">
          <label for="passwordInput" class="block text-brand-textDark font-medium mb-1 pl-3 text-lg">Crie uma senha:</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-inputBorder group-focus-within:text-brand-btnBorder transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input 
              id="passwordInput"
              type="password" 
              placeholder="Senha (6 a 8 carac.)" 
              class="w-full bg-brand-inputBg border border-brand-inputBorder rounded-xl pl-12 pr-5 py-3 text-brand-textDark placeholder-brand-inputBorder/80 focus:outline-none focus:ring-2 focus:ring-brand-btnBorder shadow-inner text-lg transition-all duration-300"
              minlength="6"
              maxlength="8"
              required
            />
          </div>
        </div>

        <div class="flex justify-center pt-8 pb-4">
          <button 
            type="submit" 
            class="bg-brand-btnBg text-brand-textDark border-[1.5px] border-brand-btnBorder rounded-xl px-12 py-3 text-xl font-bold hover:bg-[#7da02b] transition-colors shadow-[0px_4px_0px_rgba(93,125,14,0.3)] active:shadow-none active:translate-y-1"
          >
            CRIAR CONTA
          </button>
        </div>

        <div class="flex items-center my-4">
          <div class="flex-1 border-t border-brand-inputBorder"></div>
          <span class="px-4 text-brand-textDark text-lg">ou</span>
          <div class="flex-1 border-t border-brand-inputBorder"></div>
        </div>

        <div class="flex flex-col items-center pt-3">
          <span class="text-brand-textDark font-medium text-lg">Já tem uma conta?</span>
          <a href="login.html" class="text-brand-textDark font-bold hover:underline text-lg mt-1">
            Faça login aqui!
          </a>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', (event) => {
      event.preventDefault(); 
      alert('Cadastro simulado com sucesso! 🎉 (Modo Apenas Front-end)');
      window.location.href = 'index.html?next=login.html';
    });
  </script>
</body>
</html>
